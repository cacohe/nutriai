version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client.prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
