services:
  - type: web
    name: nutriai-server
    env: node
    region: singapore
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_MODEL_NAME
        value: qwen3.5-122b-a10b
      - key: QWEN_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: DEFAULT_MODEL
        value: qwen
      - key: PORT
        value: 3001
    autoDeploy: true

  - type: web
    name: nutriai-client
    env: static
    region: singapore
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://nutriai-server.onrender.com
    autoDeploy: true
